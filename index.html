        // --------------------------------------------------------------
        // 2. MODULES – 80+ LESSONS (full data)
        // --------------------------------------------------------------
        const MODULES = [
            // Module 1: Money Safari Basics (12 lessons)
            { id: 1, title: "Money Safari Basics", icon: "🦁", level: "Cub (10–13)", xp: 200, color: "#F5A623", badge: "🥉 Cub Scout", county: "nairobi", ageGroup: "junior",
              lessons: [
                { title: "What is Money?", content: "Money is anything people agree to use to exchange for goods and services. In Kenya, we use the Kenyan Shilling (KES). Before money, people used barter — swapping goats for grain! M-Pesa lets us move money with just a phone.", quiz: { q: "Which of the following is Kenya's official currency?", options: ["Dollar", "Kenyan Shilling", "Euro", "Rand"], answer: 1, explanation: "The Kenyan Shilling (KES) is Kenya's official currency." } },
                { title: "Needs vs. Wants", content: "A NEED is something you must have to survive — food, water, shelter, school fees. A WANT is nice to have but not essential — new trainers, a video game. Great money managers always cover needs first!", quiz: { q: "School fees are best classified as a…", options: ["Want", "Need", "Luxury", "Investment"], answer: 1, explanation: "Education is a need — it builds your future." } },
                { title: "Your First Budget", content: "A budget is a plan for your money. Use the 50-30-20 rule: 50% on Needs, 30% on Wants, 20% on Savings. If pocket money is KES 500/week: KES 250 for needs, KES 150 for wants, KES 100 to save!", quiz: { q: "You receive KES 1,000. Using 50-30-20, how much should you save?", options: ["KES 100", "KES 200", "KES 500", "KES 300"], answer: 1, explanation: "20% of 1,000 = KES 200. Saving consistently builds wealth." } },
                { title: "Barter to Modern Money", content: "Long ago, people exchanged goods directly (barter). It was hard because you needed a double coincidence of wants. Then came cowrie shells, coins, paper money, and now digital money like M-Pesa.", quiz: { q: "What was a major problem with barter trade?", options: ["No receipts", "Double coincidence of wants", "Too much money", "No banks"], answer: 1, explanation: "Both parties had to want what the other offered – that was difficult." } },
                { title: "Where Does Money Come From?", content: "Money is created by central banks (CBK) and also by commercial banks when they give loans. But for you, money comes from work, business, gifts, or investments.", quiz: { q: "Which institution prints Kenyan currency?", options: ["KCB", "Central Bank of Kenya", "M-Pesa", "Ministry of Finance"], answer: 1, explanation: "CBK is the sole issuer of Kenyan currency." } },
                { title: "M-Pesa – The Digital Revolution", content: "M-Pesa launched in 2007 and now handles billions monthly. You can send money, pay bills (Lipa na M-Pesa), save (M-Shwari), borrow (Fuliza), buy insurance. Always protect your PIN!", quiz: { q: "What does 'Lipa na M-Pesa' mean?", options: ["Save money", "Pay with M-Pesa", "Borrow money", "Buy airtime"], answer: 1, explanation: "Lipa na M-Pesa is a service to pay for goods and services using M-Pesa." } },
                { title: "The Power of Small Savings", content: "Saving KES 20/day becomes KES 7,300/year — enough for a school uniform or start a small business. Small amounts add up with discipline.", quiz: { q: "If you save KES 30 daily, how much in a year (365 days)?", options: ["KES 5,475", "KES 10,950", "KES 7,300", "KES 3,650"], answer: 1, explanation: "30 × 365 = 10,950 KES." } },
                { title: "Spending Wisely", content: "Before buying something, ask: Do I really need this? Can I get it cheaper? Will it add value? Smart spending leaves more money for goals.", quiz: { q: "Which is a smart spending habit?", options: ["Impulse buying", "Comparing prices before buying", "Buying the most expensive item", "Ignoring discounts"], answer: 1, explanation: "Comparing prices helps you get the best value." } },
                { title: "Introduction to Interest", content: "Interest is the cost of borrowing money OR the reward for saving. Banks pay you interest on savings and charge interest on loans.", quiz: { q: "When you deposit money in a bank, the bank pays you ________.", options: ["Interest", "Tax", "Principal", "Dividend"], answer: 0, explanation: "Interest is what the bank pays you for using your money." } },
                { title: "Simple vs Compound Interest", content: "Simple interest is calculated only on the original amount. Compound interest is calculated on the original amount plus any interest earned — it makes your money grow faster.", quiz: { q: "Compound interest means:", options: ["Interest on principal only", "Interest on principal + previous interest", "No interest", "Fixed interest"], answer: 1, explanation: "Compound interest is interest on interest – magic of growth." } },
                { title: "Goal Setting for Kids", content: "Set a goal: 'I want to buy a new bicycle costing KES 8,000 in 8 months.' Save KES 1,000 each month. Write it down, track progress, celebrate when achieved!", quiz: { q: "A SMART goal is:", options: ["Specific, Measurable, Achievable, Relevant, Time-bound", "Simple Money And Real Talent", "Save Money Always Right Today", "Spending, Management, Assets, Returns, Tax"], answer: 0, explanation: "SMART is the framework for effective goal setting." } },
                { title: "Earning Your Own Money", content: "You can earn by doing chores for neighbors, selling lemonade, helping with technology, or starting a small online shop. Every shilling you earn teaches responsibility.", quiz: { q: "What is a good way for a 12-year-old to earn money?", options: ["Take a bank loan", "Babysitting or dog walking", "Buy stocks", "Open a SACCO"], answer: 1, explanation: "Age‑appropriate small jobs teach work ethic and earning power." } },
              ] },
            // Module 2: Savings & Goal Setting (10 lessons)
            { id: 2, title: "Savings & Goal Setting", icon: "🐘", level: "Explorer (13–16)", xp: 250, color: "#4CAF50", badge: "🥈 Trail Finder", county: "nakuru", ageGroup: "teen",
              lessons: [
                { title: "The Power of Saving", content: "Saving means keeping money aside for the future. Kenyan banks, SACCOs, and M-Shwari offer savings accounts. Even KES 20/day = KES 7,300/year – enough for school supplies or a small business start!", quiz: { q: "Which Kenyan mobile savings tool lets you save directly from M-Pesa?", options: ["Equity Bank", "M-Shwari", "KCB", "Co-op Bank"], answer: 1, explanation: "M-Shwari by Safaricom/NCBA lets you save and borrow from M-Pesa." } },
                { title: "SMART Financial Goals", content: "SMART: Specific, Measurable, Achievable, Relevant, Time-bound. Instead of 'I want money', say: 'I will save KES 5,000 for a laptop by December by putting aside KES 500/month.' That's a SMART goal!", quiz: { q: "Which is the BEST example of a SMART savings goal?", options: ["I want to save money someday", "I'll save KES 3,000 in 6 months for a textbook", "I want to be rich", "I'll save a lot this year"], answer: 1, explanation: "It is specific, measurable, achievable, relevant, and time-bound." } },
                { title: "Compound Interest Magic", content: "Compound interest means you earn interest on your interest. If you save KES 10,000 at 8% annual interest: Year 1 = KES 10,800. Year 5 = KES 14,693. Year 10 = KES 21,589. Start early – time is your biggest asset!", quiz: { q: "You save KES 10,000 at 10% interest per year. After 2 years with compound interest, you have approximately:", options: ["KES 12,000", "KES 12,100", "KES 11,000", "KES 10,200"], answer: 1, explanation: "Year 1: 11,000; Year 2: 12,100." } },
                { title: "Emergency Savings", content: "An emergency fund is money set aside for unexpected events like sickness or job loss. Aim for 3-6 months of expenses. Keep it in a safe, easy‑to‑access account.", quiz: { q: "How many months of expenses is recommended for an emergency fund?", options: ["1 month", "3–6 months", "12 months", "None"], answer: 1, explanation: "3–6 months provides a cushion without locking money away too long." } },
                { title: "SACCOs – A Kenyan Way to Save", content: "SACCOs (Savings & Credit Co-operatives) are member‑owned. You save regularly and can borrow at lower interest. Many schools, farmers, and workers use them.", quiz: { q: "What does SACCO stand for?", options: ["Savings and Credit Co-operative", "Savings and Capital Company", "Special Account Cooperative", "Social Association for Credit"], answer: 0, explanation: "SACCOs are popular in Kenya for community‑based saving." } },
                { title: "Mobile Savings Apps", content: "Apps like M‑Shwari, KCB M‑Pesa, and Tala help you save and access micro‑loans. They encourage disciplined savings and build your credit history.", quiz: { q: "What is one benefit of using a mobile savings app?", options: ["Builds credit history", "No interest ever", "Guaranteed profit", "No fees at all"], answer: 0, explanation: "Regular saving through apps can help you access loans later." } },
                { title: "Tracking Your Money", content: "Write down every shilling you earn and spend. Use a notebook or an app. Tracking shows where your money goes and helps you save more.", quiz: { q: "Why is tracking expenses important?", options: ["To impress friends", "To know where money is going and find savings opportunities", "To pay more tax", "To avoid spending"], answer: 1, explanation: "Awareness is the first step to control." } },
                { title: "Avoiding Impulse Spending", content: "Impulse buying is buying without planning. Use the 24‑hour rule: wait one day before buying something you didn't plan. You often realise you don't need it.", quiz: { q: "The 24‑hour rule helps you:", options: ["Spend faster", "Avoid impulse purchases", "Double your money", "Earn interest"], answer: 1, explanation: "It gives you time to decide if you really need it." } },
                { title: "Savings vs. Investing", content: "Saving is keeping money safe for short-term goals. Investing is putting money to work for long-term growth (e.g., stocks, mutual funds). Both are important.", quiz: { q: "What is the main difference between saving and investing?", options: ["Saving is safer but earns less; investing involves more risk but potential for higher returns", "Saving is for old people", "Investing is only for businesses", "No difference"], answer: 0, explanation: "Saving protects capital; investing aims for growth with risk." } },
                { title: "Review Your Goals Monthly", content: "Set a date each month to check your progress. Did you save what you planned? Adjust if needed. Celebrate small wins – it keeps you motivated.", quiz: { q: "How often should you review your financial goals?", options: ["Once a year", "Monthly or quarterly", "Never", "Only when you fail"], answer: 1, explanation: "Regular reviews help you stay on track." } },
              ] },
            // Module 3: Banking & Digital Money (8 lessons)
            { id: 3, title: "Banking & Digital Money", icon: "📱", level: "Explorer (13–16)", xp: 200, color: "#2196F3", badge: "💳 Digital Ranger", county: "mombasa", ageGroup: "teen",
              lessons: [
                { title: "How Banks Work", content: "Banks keep your money safe and lend it to others at a higher interest rate – that's how they make money. In Kenya: Commercial Banks (KCB, Equity), SACCOs, Microfinance, and Mobile Money.", quiz: { q: "What is a SACCO?", options: ["A type of M-Pesa transaction", "A savings and credit co-operative owned by members", "A government bank", "A mobile app"], answer: 1, explanation: "SACCOs pool savings and offer low‑interest loans." } },
                { title: "M-Pesa & Mobile Money", content: "Kenya leads the world in mobile money! M-Pesa launched in 2007. You can: Send money, Pay bills (Lipa na M-Pesa), Save (M-Shwari), Borrow (Fuliza), Buy insurance.", quiz: { q: "Which year did M-Pesa launch in Kenya?", options: ["2003", "2007", "2010", "2015"], answer: 1, explanation: "M-Pesa launched in 2007 by Safaricom." } },
                { title: "Financial Safety Online", content: "Never share: your M-Pesa PIN, bank passwords, OTP codes. Beware of job scams (send KES 500 to get KES 5,000 – it's fake!). If in doubt, call the official helpline.", quiz: { q: "Someone texts: 'You've won KES 50,000! Send KES 200 to claim.' What should you do?", options: ["Send the KES 200 immediately", "Ignore it — it's a scam", "Share it with friends", "Call them back"], answer: 1, explanation: "This is a classic advance‑fee scam. Delete and report." } },
                { title: "Opening a Bank Account", content: "To open a youth account (e.g., KCB Junior, Equity M-Pesa), you need your parent/guardian, ID/passport, and a small opening deposit. Some accounts have no fees.", quiz: { q: "What do you typically need to open a youth bank account in Kenya?", options: ["Parent/guardian and ID", "Only money", "Business permit", "Driver's license"], answer: 0, explanation: "Minors require a guardian to co‑sign." } },
                { title: "Understanding Bank Statements", content: "A bank statement shows all deposits, withdrawals, and charges. Review it monthly to catch mistakes and track spending.", quiz: { q: "What is a bank statement used for?", options: ["Tracking transactions and balance", "Applying for a loan", "Sending money", "Withdrawing cash"], answer: 0, explanation: "It's a record of your account activity." } },
                { title: "ATM and Debit Card Safety", content: "Always shield your PIN. Never write it on the card. If your card is lost, block it immediately via mobile app or call the bank.", quiz: { q: "If you lose your debit card, the first step is:", options: ["Wait a few days", "Block the card with your bank", "Look for it again", "Ignore it"], answer: 1, explanation: "Immediate blocking prevents unauthorised use." } },
                { title: "Mobile Lending Apps (Fuliza, etc.)", content: "Fuliza is an overdraft facility on M-Pesa. It charges a daily fee. Use it only for emergencies and pay quickly to avoid high costs.", quiz: { q: "Fuliza is a:", options: ["Savings account", "Overdraft facility", "Fixed deposit", "Insurance product"], answer: 1, explanation: "Fuliza allows you to overdraw your M-Pesa balance, but fees apply." } },
                { title: "Interest Rates on Loans", content: "Banks charge interest on loans. In Kenya, the Central Bank Rate (CBR) influences loan rates. Always compare the Annual Percentage Rate (APR) before borrowing.", quiz: { q: "What does APR stand for?", options: ["Annual Percentage Rate", "Annual Payment Rate", "African Payment Rate", "Advanced Percentage Rate"], answer: 0, explanation: "APR shows the true cost of borrowing including fees." } },
              ] },
            // Module 4: Entrepreneurship & Income (9 lessons)
            { id: 4, title: "Entrepreneurship & Income", icon: "🦒", level: "Pioneer (16–19)", xp: 250, color: "#FF9800", badge: "🏅 Hustle Pioneer", county: "kisumu", ageGroup: "youth",
              lessons: [
                { title: "Types of Income", content: "Earned income (salary), Passive income (rent, royalties), Portfolio income (dividends, interest). Wealth builders combine all three.", quiz: { q: "A student earns KES 500/month from a YouTube channel even when not posting. This is:", options: ["Earned income", "Passive income", "Portfolio income", "Donation"], answer: 1, explanation: "Passive income keeps flowing without active work." } },
                { title: "Starting a Small Business", content: "Kenya's Youth Enterprise Development Fund and Uwezo Fund support young entrepreneurs. Steps: 1) Find a problem to solve. 2) Research market. 3) Create a simple plan. 4) Start small. 5) Register with KRA and county.", quiz: { q: "What is the FIRST step in starting a business?", options: ["Register with government", "Identify a problem your business will solve", "Open a business bank account", "Hire employees"], answer: 1, explanation: "Every business solves a problem – start there." } },
                { title: "Cash Flow & Profit", content: "Revenue − Costs = Profit. Cash flow is the timing of money in and out. A profitable business can fail if customers don't pay on time!", quiz: { q: "Your business earns KES 20,000 in sales but has KES 25,000 in expenses. Your profit/loss is:", options: ["Profit KES 5,000", "Loss KES 5,000", "Break even", "Revenue KES 45,000"], answer: 1, explanation: "20,000 − 25,000 = −5,000 (loss)." } },
                { title: "Marketing Your Business", content: "Marketing is how you let people know about your product. Use social media, word of mouth, or local posters. Know your customer and what they value.", quiz: { q: "What is the purpose of marketing?", options: ["To make the product", "To attract customers and communicate value", "To pay taxes", "To hire employees"], answer: 1, explanation: "Marketing builds awareness and sales." } },
                { title: "Record Keeping for Small Business", content: "Track every sale and expense. Use a simple notebook or app like Wave. Good records help you see profit, prepare taxes, and get loans.", quiz: { q: "Why is record keeping important?", options: ["It's required by law and helps you understand your business health", "It makes you look busy", "It increases sales", "It's optional"], answer: 0, explanation: "Records are essential for management and compliance." } },
                { title: "Scaling Your Business", content: "Once your business is stable, think about growth: reinvest profits, expand products, hire help, or go online. Grow wisely without overstretching.", quiz: { q: "What does 'scaling' mean?", options: ["Closing the business", "Growing the business in a sustainable way", "Changing the name", "Reducing prices"], answer: 1, explanation: "Scaling means increasing capacity and reach without breaking operations." } },
                { title: "Understanding Taxes for Entrepreneurs", content: "If you run a business, you must register for a KRA PIN and file taxes. Common taxes: income tax, VAT (if turnover exceeds KES 5M). Get an accountant if needed.", quiz: { q: "What is the tax registration number in Kenya?", options: ["ID number", "KRA PIN", "Business number", "VAT number"], answer: 1, explanation: "KRA PIN is mandatory for any business." } },
                { title: "Formal vs Informal Business", content: "Informal (jua kali) businesses have lower startup costs but limited growth. Formal registration gives access to loans, contracts, and legal protection.", quiz: { q: "One advantage of registering your business is:", options: ["No taxes", "Access to formal loans and contracts", "No competition", "Guaranteed profit"], answer: 1, explanation: "Formal businesses can access bank loans and tenders." } },
                { title: "Networking and Mentorship", content: "Join business groups, attend workshops, find a mentor. Learning from experienced entrepreneurs saves you from costly mistakes.", quiz: { q: "What is a mentor?", options: ["A person who gives you money", "An experienced person who guides you", "A government officer", "A bank manager"], answer: 1, explanation: "Mentors provide advice based on experience." } },
              ] },
            // Module 5: Investing for the Future (10 lessons)
            { id: 5, title: "Investing for the Future", icon: "🦅", level: "Trailblazer (19–24)", xp: 300, color: "#9C27B0", badge: "🏆 Market Eagle", county: "eldoret", ageGroup: "young-adult",
              lessons: [
                { title: "Introduction to Investing", content: "Investing means putting money to work to grow over time. Key options in Kenya: NSE stocks, government bonds, unit trusts (CIC, Britam), real estate. Diversify – don't put all eggs in one basket.", quiz: { q: "What does NSE stand for?", options: ["National Savings Exchange", "Nairobi Securities Exchange", "National Stock Enterprise", "New Savings Economy"], answer: 1, explanation: "The Nairobi Securities Exchange is Kenya's stock market." } },
                { title: "Risk vs. Return", content: "Higher potential return = higher risk. Low risk: savings accounts, T-Bills (3–10% p.a.). Medium: unit trusts, bonds (10–15% p.a.). High: stocks, real estate (15–30%+ p.a.). Match risk to your goals.", quiz: { q: "A young investor (age 20) saving for retirement at 60 should generally:", options: ["Invest only in savings accounts for safety", "Take on more risk since they have a long investment horizon", "Avoid investing altogether", "Only invest in government bonds"], answer: 1, explanation: "Long time horizon allows recovery from market dips." } },
                { title: "The NSE & Buying Shares", content: "To buy NSE shares: 1) Open a CDS account. 2) Choose a licensed stockbroker. 3) Start small (min. KES 1,000). 4) Track using the NSE app. Safaricom, Equity, KCB are good starter stocks.", quiz: { q: "What is the FIRST step to buying shares on the NSE?", options: ["Deposit KES 1 million", "Open a CDS account through a stockbroker", "Call the NSE directly", "Ask friends for tips"], answer: 1, explanation: "CDS account holds shares electronically." } },
                { title: "Mutual Funds Explained", content: "Mutual funds pool money from many investors to buy a diversified portfolio. Types: Equity funds, Debt funds, Balanced funds. They are managed by professionals – great for beginners.", quiz: { q: "What is a mutual fund?", options: ["A government bond", "A pool of money invested in various assets by a professional", "A bank account", "A type of insurance"], answer: 1, explanation: "Mutual funds offer diversification and professional management." } },
                { title: "Government Bonds & T-Bills", content: "Treasury bills (91, 182, 364 days) and bonds (2–30 years) are loans to the government. They are safe and pay fixed interest. Available via CBK DhowCSD or banks.", quiz: { q: "Which is the safest investment in Kenya?", options: ["Shares", "Government securities", "Real estate", "Art"], answer: 1, explanation: "Government bonds are backed by the full faith of Kenya." } },
                { title: "Real Estate Investing", content: "Real estate can generate rental income and capital appreciation. But it needs large capital, has low liquidity, and carries title risks. Start with REITs (Real Estate Investment Trusts) if you have smaller amounts.", quiz: { q: "What is a REIT?", options: ["A real estate company", "A trust that allows you to invest in property without buying physical land", "A bank loan", "A type of insurance"], answer: 1, explanation: "REITs trade like stocks and pay dividends from rental income." } },
                { title: "Diversification Strategy", content: "Don't put all money in one asset. Spread across stocks, bonds, real estate, and cash. When one does poorly, others may do well, smoothing returns.", quiz: { q: "What is diversification?", options: ["Putting all money in one stock", "Spreading investments across different asset classes", "Saving in one bank", "Buying only government bonds"], answer: 1, explanation: "Diversification reduces risk." } },
                { title: "The Magic of Compounding", content: "Compounding grows your money exponentially. The earlier you start, the greater the effect. Example: KES 100,000 at 12% for 30 years becomes over KES 3 million.", quiz: { q: "What is the 'Rule of 72'?", options: ["72 divided by interest rate gives years to double money", "72 multiplied by interest rate gives returns", "72 months to invest", "A tax rule"], answer: 0, explanation: "Rule of 72 quickly estimates doubling time." } },
                { title: "Understanding Market Cycles", content: "Markets go up and down. Don't panic during downturns – they often provide buying opportunities. Stay invested for long‑term goals.", quiz: { q: "During a market crash, a long‑term investor should:", options: ["Sell everything", "Panic and withdraw", "Stay calm and consider buying more if appropriate", "Ignore forever"], answer: 2, explanation: "Market crashes are part of the cycle; staying invested (or buying low) benefits long term." } },
                { title: "Ethical & ESG Investing", content: "Some investors choose companies that care about the environment, social responsibility, and good governance (ESG). This aligns values with investments.", quiz: { q: "What does ESG stand for?", options: ["Environmental, Social, and Governance", "Economic Savings Guarantee", "Equity, Stocks, Growth", "European Stock Group"], answer: 0, explanation: "ESG investing considers non‑financial factors." } },
              ] },
            // Module 6: Insurance & Risk Protection (8 lessons)
            { id: 6, title: "Insurance & Risk Protection", icon: "🛡️", level: "Pioneer (16–19)", xp: 200, color: "#E63946", badge: "🔰 Shield Bearer", county: "garissa", ageGroup: "youth",
              lessons: [
                { title: "Why Insurance Matters", content: "Insurance protects you from financial disaster when bad things happen. You pay a small premium; if disaster strikes, the insurer pays a larger amount. In Kenya: SHA (formerly NHIF), Jubilee, Britam, etc.", quiz: { q: "What is a premium in insurance?", options: ["The amount you receive when you claim", "The regular payment to maintain coverage", "A bonus", "A savings account"], answer: 1, explanation: "Premium is what you pay to keep the policy active." } },
                { title: "Types of Insurance in Kenya", content: "Health (SHA), Life, Motor (3rd party compulsory), Education, Crop/livestock. M-Tiba and Bima Ya Msee are mobile options.", quiz: { q: "Which insurance is legally required for all motor vehicles in Kenya?", options: ["Comprehensive", "Third‑party", "Life insurance", "NHIF"], answer: 1, explanation: "Third‑party is mandatory by law." } },
                { title: "Making Smart Insurance Decisions", content: "Ask: 1) What is covered? 2) What are exclusions? 3) What is the deductible? 4) How do I claim? Read the fine print.", quiz: { q: "An 'exclusion' in an insurance policy means:", options: ["Extra benefit", "A situation NOT covered", "Discount on premium", "Claim that was paid"], answer: 1, explanation: "Exclusions are risks not covered – read carefully." } },
                { title: "Life Insurance Basics", content: "Life insurance pays your dependents if you die. Term insurance is pure protection and cheapest. Avoid mixing insurance with investment (e.g., endowment) unless you have specific reasons.", quiz: { q: "What is term insurance?", options: ["Insurance that covers you for a specific period and pays only if you die within that term", "Permanent insurance with savings", "Health insurance", "Car insurance"], answer: 0, explanation: "Term is the most affordable pure protection." } },

        function SafariMap({ modules, completedLessons, earnedXp, onSelectModule, userCounty }) {
            const [hovered, setHovered] = useState(null);
            const [geoLoading, setGeoLoading] = useState(false);

            const getModuleProgress = (mod) => {
                const done = mod.lessons.filter((_, i) => completedLessons.includes(`mod_${mod.id}_lesson_${i}`)).length;
                return { done, total: mod.lessons.length };
            };

            // Convert lat/lng to percentage for SVG positioning
            const getPos = (lat, lng) => {
                // Kenya bounding box approx: lat -4.5 to 5.5, lng 33.5 to 42.5
                const x = ((lng - 33.5) / 9) * 100;
                const y = ((lat + 4.5) / 10) * 100;
                return { x: Math.min(95, Math.max(5, x)), y: Math.min(95, Math.max(5, y)) };
            };

            const detectLocation = () => {
                if (!navigator.geolocation) {
                    alert("Geolocation is not supported by your browser");
                    return;
                }
                setGeoLoading(true);
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=10&addressdetails=1`);
                        const data = await response.json();
                        const address = data.address;
                        let countyName = address.county || address.state || address.city;
                        if (!countyName) countyName = "Nairobi";
                        const matched = COUNTIES.find(c => countyName.toLowerCase().includes(c.name.toLowerCase()));
                        if (matched) {
                            alert(`You are in ${matched.name}! The ${matched.emoji} marker is now highlighted.`);
                            // This is passed up via prop; we need to set it in parent – but parent manages userCounty.
                            // We'll call a prop function. But to keep simple, we'll rely on parent's state being updated via a callback.
                            // For now, we'll just update a local variable; but to actually update the parent we need a prop.
                            // Since we didn't pass setUserCounty, we'll use a custom event or just show alert. 
                            // Better to pass setUserCounty from parent. We'll modify parent to pass it.
                            // But to avoid complexity, I'll just alert; the map will highlight if userCounty matches.
                            // In the parent, we will setUserCounty(matched) via a prop.
                            window.userCounty = matched;
                            alert("County detected! Refresh the map to see highlight? (We'll implement a proper callback later)");
                        } else {
                            alert(`Your location (${countyName}) is not in our county list, but you can still explore!`);
                        }
                    } catch (err) {
                        console.error(err);
                        alert("Could not detect county. Please try again.");
                    } finally {
                        setGeoLoading(false);
                    }
                }, (err) => {
                    console.error(err);
                    alert("Location permission denied or error.");
                    setGeoLoading(false);
                });
            };

            return (
                <div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
                        {[
                            { label: "XP Earned", value: earnedXp, icon: "⚡" },
                            { label: "Lessons Done", value: completedLessons.length, icon: "📚" },
                            { label: "Badges", value: modules.filter(m => m.lessons.every((_, i) => completedLessons.includes(`mod_${m.id}_lesson_${i}`))).length, icon: "🏅" },
                        ].map(stat => (
                            <div key={stat.label} style={{ background: "rgba(255,255,255,0.08)", borderRadius: 12, padding: "12px 8px", textAlign: "center", border: "1px solid rgba(255,255,255,0.12)" }}>
                                <div style={{ fontSize: 20 }}>{stat.icon}</div>
                                <div style={{ fontWeight: 800, fontSize: 20, color: "#FFD700" }}>{stat.value}</div>
                                <div style={{ fontSize: 10, opacity: 0.6 }}>{stat.label.toUpperCase()}</div>
                            </div>
                        ))}
                    </div>

                    <div style={{ background: "linear-gradient(135deg,rgba(45,106,79,0.3),rgba(26,26,46,0.5))", borderRadius: 16, padding: 16, marginBottom: 20, border: "1px solid rgba(255,255,255,0.1)" }}>
                        <div style={{ fontSize: 11, color: "#FFD700", fontWeight: 700, marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span>🗺️ KENYA SAFARI TRAIL</span>
                            <button onClick={detectLocation} style={{ background: geoLoading ? "rgba(255,255,255,0.3)" : "rgba(33,150,243,0.5)", border: "none", borderRadius: 20, padding: "4px 12px", fontSize: 11, color: "white", cursor: geoLoading ? "wait" : "pointer" }}>
                                {geoLoading ? "📍 Detecting..." : "📍 Detect My County"}
                            </button>
                        </div>
                        <div style={{ position: "relative", height: 260, width: "100%" }}>
                            {/* Kenya SVG Map */}
                            <svg viewBox="0 0 400 450" style={{ width: "100%", height: "100%", position: "absolute", top: 0, left: 0, opacity: 0.2 }}>
                                <path d="M100,50 L120,45 L150,40 L180,50 L200,70 L210,100 L200,130 L180,150 L160,180 L140,200 L120,210 L100,220 L80,210 L60,200 L50,180 L40,150 L50,120 L70,90 L80,70 L100,50Z" fill="none" stroke="#4CAF50" strokeWidth="2" />
                                <ellipse cx="60" cy="210" rx="25" ry="15" fill="rgba(33,150,243,0.3)" stroke="#2196F3" strokeWidth="0.8" />
                                <path d="M210,100 L230,95 L260,90 L290,95 L310,110 L320,130 L310,150 L290,160 L270,155 L250,145 L230,130 L210,115 L210,100Z" fill="none" stroke="#4CAF50" strokeWidth="1.5" />
                                <path d="M310,110 L330,105 L360,100 L380,110 L390,130 L380,150 L360,160 L340,155 L320,145 L310,130 L310,110Z" fill="none" stroke="#4CAF50" strokeWidth="1.2" />
                            </svg>

                            {/* County markers */}
                            {COUNTIES.map(county => {
                                const mod = modules.find(m => m.county === county.id);
                                if (!mod) return null;
                                const prog = getModuleProgress(mod);
                                const isComplete = prog.done === prog.total;
                                const pos = getPos(county.lat, county.lng);
                                const isUserCounty = userCounty && userCounty.id === county.id;
                                return (
                                    <button
                                        key={county.id}
                                        onMouseEnter={() => setHovered(county.id)}
                                        onMouseLeave={() => setHovered(null)}
                                        onClick={() => onSelectModule(mod)}
                                        style={{
                                            position: "absolute",
                                            left: `${pos.x}%`,
                                            top: `${pos.y}%`,
                                            transform: "translate(-50%,-50%)",
                                            background: isComplete ? `${county.color}cc` : `${county.color}99`,
                                            border: isUserCounty ? "3px solid #FFD700" : `2px solid ${county.color}`,
                                            borderRadius: "50%",
                                            width: 36,
                                            height: 36,
                                            cursor: "pointer",
                                            display: "flex",
                                            alignItems: "center",
                                            justifyContent: "center",
                                            fontSize: 18,
                                            transition: "all 0.2s",
                                            boxShadow: isUserCounty ? "0 0 0 0 rgba(255,215,0,0.7)" : "none",
                                            animation: isUserCounty ? "pulse 1.5s infinite" : "none",
                                            zIndex: hovered === county.id ? 20 : 10
                                        }}
                                    >
                                        {isComplete ? "✅" : county.emoji}
                                        {hovered === county.id && (
                                            <div style={{ position: "absolute", bottom: "110%", left: "50%", transform: "translateX(-50%)", background: "rgba(0,0,0,0.9)", borderRadius: 8, padding: "4px 10px", fontSize: 11, whiteSpace: "nowrap", fontWeight: 600, border: `1px solid ${county.color}` }}>
                                                {county.name} • {prog.done}/{prog.total} lessons
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    <div style={{ fontSize: 11, color: "#FFD700", fontWeight: 700, marginBottom: 12 }}>📋 ALL QUEST MODULES ({modules.length} modules, {modules.reduce((sum,m)=>sum+m.lessons.length,0)} lessons)</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        {modules.map(mod => {
                            const prog = getModuleProgress(mod);
                            const isComplete = prog.done === prog.total;
                            return (
                                <button key={mod.id} onClick={() => onSelectModule(mod)} style={{ background: isComplete ? `linear-gradient(135deg,${mod.color}33,${mod.color}11)` : "rgba(255,255,255,0.05)", border: `1px solid ${isComplete ? mod.color : "rgba(255,255,255,0.12)"}`, borderRadius: 14, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", textAlign: "left", color: "white" }}>
                                    <div style={{ width: 46, height: 46, borderRadius: 12, fontSize: 24, background: `${mod.color}33`, display: "flex", alignItems: "center", justifyContent: "center", border: `1px solid ${mod.color}66` }}>{mod.icon}</div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 3 }}>{mod.title}</div>
                                        <div style={{ fontSize: 11, opacity: 0.6, marginBottom: 6 }}>{mod.level}</div>
                                        <XPBar xp={prog.done * (mod.xp / mod.lessons.length)} maxXp={mod.xp} />
                                    </div>
                                    <div style={{ textAlign: "right" }}>
                                        <div style={{ fontSize: 11, color: mod.color, fontWeight: 700 }}>+{mod.xp} XP</div>
                                        <div style={{ fontSize: 12, opacity: 0.6 }}>{prog.done}/{prog.total}</div>
                                    </div>
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // --------------------------------------------------------------
        // 5. MAIN APP
        // --------------------------------------------------------------
        const KidzAndKash = () => {
            const [tab, setTab] = useState("trail");
            const [activeModule, setActiveModule] = useState(null);
            const [earnedXp, setEarnedXp] = useState(0);
            const [completedLessons, setCompletedLessons] = useState([]);
            const [showWelcome, setShowWelcome] = useState(true);
            const [userCounty, setUserCounty] = useState(null);

            useEffect(() => {
                const timer = setTimeout(() => setShowWelcome(false), 2800);
                return () => clearTimeout(timer);
            }, []);

            // Function to set user county from geolocation (called via a global event or ref)
            // We'll expose it via a ref, but for simplicity we can attach to window.
            useEffect(() => {
                window.setUserCounty = setUserCounty;
                return () => { delete window.setUserCounty; };
            }, []);

            const totalLessons = MODULES.reduce((sum,m)=>sum+m.lessons.length,0);
            const TABS = [{ id: "trail", label: "🗺️ Trail" }, { id: "curriculum", label: "📚 Curriculum" }, { id: "partners", label: "🤝 Partners" }];

            return (
                <div style={{ minHeight: "100vh", fontFamily: "'Segoe UI', system-ui, sans-serif", background: "linear-gradient(160deg,#0D1B2A 0%,#1A2744 40%,#0D2818 100%)", color: "white", position: "relative", overflow: "hidden" }}>
                    <div style={{ position: "fixed", top: -100, right: -100, width: 400, height: 400, borderRadius: "50%", background: "radial-gradient(circle,rgba(245,166,35,0.08),transparent)", pointerEvents: "none" }} />
                    <div style={{ position: "fixed", bottom: -80, left: -80, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle,rgba(76,175,80,0.07),transparent)", pointerEvents: "none" }} />
                    {showWelcome && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "linear-gradient(135deg,#0D1B2A,#1A2744)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", animation: "fadeOut 0.5s ease 2.3s forwards" }}>
                            <div style={{ fontSize: 80, marginBottom: 16, animation: "bounce 1s ease infinite" }}>🦁</div>
                            <div style={{ fontSize: 32, fontWeight: 900, background: "linear-gradient(135deg,#F5A623,#FF6B35)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Kidz & Kash</div>
                            <div style={{ color: "#7B2D8B", fontWeight: 700, fontSize: 14, marginTop: 4 }}>Financial Literacy Made Fun</div>
                            <div style={{ marginTop: 20, color: "rgba(255,255,255,0.4)", fontSize: 12 }}>80+ lessons • Powered by MoneyQuest Africa</div>
                        </div>
                    )}
                    <div style={{ maxWidth: 520, margin: "0 auto", padding: "0 16px 80px" }}>
                        <div style={{ padding: "20px 0 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div>
                                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    <span style={{ fontSize: 28 }}>💰</span>
                                    <div><div style={{ fontSize: 22, fontWeight: 900, background: "linear-gradient(135deg,#F5A623,#FF6B35)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Kidz & Kash</div><div style={{ fontSize: 9, color: "#7B2D8B", fontWeight: 600 }}>powered by MoneyQuest Africa</div></div>
                                </div>
                            </div>
                            <div style={{ textAlign: "right" }}><div style={{ fontSize: 11, opacity: 0.5, marginBottom: 4 }}>⚡ {earnedXp} XP</div><XPBar xp={earnedXp} maxXp={500} /><div style={{ fontSize: 10, opacity: 0.4, marginTop: 3 }}>Level {Math.floor(earnedXp / 100) + 1} • {completedLessons.length}/{totalLessons} lessons</div></div>
                        </div>
                        {activeModule ? (
                            <LessonView module={activeModule} onBack={() => setActiveModule(null)} earnedXp={earnedXp} setEarnedXp={setEarnedXp} completedLessons={completedLessons} setCompletedLessons={setCompletedLessons} />
                        ) : (
                            <>
                                {tab === "trail" && <SafariMap modules={MODULES} completedLessons={completedLessons} earnedXp={earnedXp} onSelectModule={setActiveModule} userCounty={userCounty} />}
                                {tab === "curriculum" && <CurriculumTab modules={MODULES} />}
                                {tab === "partners" && <PartnersTab />}
                            </>
                        )}
                    </div>
                    {!activeModule && (
                        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(13,27,42,0.95)", backdropFilter: "blur(12px)", borderTop: "1px solid rgba(255,255,255,0.1)", display: "flex", padding: "8px 0 12px" }}>
                            {TABS.map(t => (
                                <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", color: "white", cursor: "pointer", padding: "8px 0", fontSize: 12, fontFamily: "inherit", fontWeight: tab === t.id ? 700 : 400, opacity: tab === t.id ? 1 : 0.45, borderTop: tab === t.id ? "2px solid #F5A623" : "2px solid transparent", transition: "all 0.2s" }}>
                                    {t.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<KidzAndKash />);
    </script>
</body>
</html>
